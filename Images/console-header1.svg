<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 240" width="800" height="240">
  <defs>
    <!-- Blueprint Dotted Pattern -->
    <pattern id="dot-grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#1c1d21" />
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#050506" />
  
  <!-- Dot Grid Pattern Layer -->
  <rect width="100%" height="100%" fill="url(#dot-grid)" />

  <!-- Outer Border & Brackets -->
  <rect x="10" y="10" width="780" height="220" fill="none" stroke="#1f2127" stroke-width="1" />
  
  <!-- Corner Brackets -->
  <path d="M 10 30 L 10 10 L 30 10" fill="none" stroke="#3df5b0" stroke-width="2" />
  <path d="M 790 30 L 790 10 L 770 10" fill="none" stroke="#3df5b0" stroke-width="2" />
  <path d="M 10 210 L 10 230 L 30 230" fill="none" stroke="#3df5b0" stroke-width="2" />
  <path d="M 790 210 L 790 230 L 770 230" fill="none" stroke="#3df5b0" stroke-width="2" />

  <!-- Status Bar -->
  <line x1="10" y1="45" x2="790" y2="45" stroke="#1f2127" stroke-width="1" />
  <circle cx="30" cy="28" r="4" fill="#3df5b0">
    <animate attributeName="opacity" values="0.2;1;0.2" dur="2.5s" repeatCount="indefinite" />
  </circle>
  <text x="44" y="32" font-family="monospace" font-size="10" fill="#80848f" letter-spacing="1.5">SYSTEMS OPERATOR CONSOLE // ACTIVE</text>
  <text x="635" y="32" font-family="monospace" font-size="10" fill="#80848f" letter-spacing="1">LOC: REMOTE // GLOBAL</text>

  <!-- Main Identity -->
  <text x="35" y="105" font-family="sans-serif" font-weight="900" font-size="44" fill="#F2F3F5" letter-spacing="-1">HAMZA BEN ROUMMANE</text>
  
  <!-- Subtitle -->
  <text x="35" y="138" font-family="monospace" font-weight="700" font-size="14" fill="#3df5b0" letter-spacing="1">REMOTE TECHNICAL LEAD // END-TO-END SAAS ARCHITECT</text>
  <text x="35" y="158" font-family="monospace" font-weight="700" font-size="14" fill="#3df5b0" letter-spacing="1">AI &amp; BLOCKCHAIN ENGINEER</text>

  <!-- Bottom Details Bar -->
  <line x1="10" y1="195" x2="790" y2="195" stroke="#1f2127" stroke-width="1" />
  <text x="35" y="212" font-family="monospace" font-size="10" fill="#80848f" letter-spacing="1">PhD RESEARCHER (AI &amp; ROBOTICS) · 5+ YEARS SOFTWARE ENGINEERING</text>
  <text x="715" y="212" font-family="monospace" font-size="10" fill="#3df5b0" letter-spacing="1">EN · FR · AR</text>
</svg>
