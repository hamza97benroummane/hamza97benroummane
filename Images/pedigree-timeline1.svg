  <path d="M 10 25 L 10 10 L 25 10" fill="none" stroke="#3df5b0" stroke-width="2" />
  <path d="M 790 25 L 790 10 L 775 10" fill="none" stroke="#3df5b0" stroke-width="2" />
  <path d="M 10 425 L 10 440 L 25 440" fill="none" stroke="#3df5b0" stroke-width="2" />
  <path d="M 790 425 L 790 440 L 775 440" fill="none" stroke="#3df5b0" stroke-width="2" />

  <!-- Header Title -->
