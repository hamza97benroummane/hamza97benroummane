  <!-- Right Column Header: Engineering -->
  <text x="590" y="80" font-family="monospace" font-weight="700" font-size="11" fill="#80848f" text-anchor="middle" letter-spacing="1.5">💻 TECHNICAL LEADERSHIP &amp; SYSTEMS</text>

