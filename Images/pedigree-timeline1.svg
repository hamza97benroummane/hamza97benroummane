  <rect x="440" y="375" width="320" height="55" fill="#08090a" stroke="#1f2127" stroke-width="1" />
  <text x="455" y="397" font-family="sans-serif" font-weight="800" font-size="12" fill="#F2F3F5">Software Engineering Journey</text>
  <text x="455" y="413" font-family="monospace" font-size="9" fill="#80848f">5+ Years of Performance-Driven Programming</text>
