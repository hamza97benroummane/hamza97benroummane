  <text x="455" y="330" font-family="monospace" font-size="10" fill="#80848f">2019 — 2022 // Remote Platforms &amp; Startups</text>
  <text x="455" y="346" font-family="sans-serif" font-size="10" fill="#b6b9c2">Node.js microservices, Stripe gateways, databases</text>
