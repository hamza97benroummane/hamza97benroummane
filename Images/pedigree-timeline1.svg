  <text x="645" y="35" font-family="monospace" font-size="10" fill="#80848f" letter-spacing="1">DOUBLE-TRACK VIEW</text>
  <line x1="10" y1="48" x2="790" y2="48" stroke="#1f2127" stroke-width="1" stroke-dasharray="4 4" />

