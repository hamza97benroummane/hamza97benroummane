<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <!-- Grid Pattern -->
    <pattern id="dot-grid-2" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#16181d" />
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#050506" />
  <rect width="100%" height="100%" fill="url(#dot-grid-2)" />

  <!-- Outer Border & Corner Accents -->
